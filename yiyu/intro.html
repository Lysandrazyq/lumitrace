<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一隅 · 每天一问，写下三行的自己</title>
  <meta name="description" content="每天一个问题，写下三行的自己。纯本地，不上传。">
  <style>
    :root {
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --accent: #4A6B5D;
      --ink: #2B2A26;
      --ink-soft: #8A857B;
      --ink-dim: #C4BFB7;
      --sep: rgba(60,56,48,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .serif { font-family: Georgia, "Noto Serif SC", "Songti SC", serif; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.06em; }

    .open-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .open-link:hover { opacity: 1; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 40px 48px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .accent-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-bottom: 32px;
    }

    .hero-title {
      font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(64px, 16vw, 96px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero-sub {
      font-family: Georgia, "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(17px, 4vw, 21px);
      color: var(--ink-soft);
      line-height: 1.65;
      margin-bottom: 40px;
      max-width: 340px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 15px 36px;
      border-radius: 99px;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(74,107,93,0.25);
    }
    .cta:hover { opacity: 0.88; transform: translateY(-1px); }
    .cta:active { transform: scale(0.97); }
    .cta-arrow { font-size: 18px; opacity: 0.8; }

    .features {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 0 40px 64px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      border-top: 1px solid var(--sep);
    }

    .feat {
      flex: 1;
      text-align: center;
      padding: 32px 16px 0;
    }
    .feat + .feat { border-left: 1px solid var(--sep); }

    .feat-glyph {
      font-size: 20px;
      color: var(--accent);
      margin-bottom: 10px;
      opacity: 0.7;
    }
    .feat-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 5px;
      letter-spacing: 0.02em;
    }
    .feat-desc {
      font-size: 12px;
      color: var(--ink-soft);
      line-height: 1.65;
    }

    footer {
      padding: 20px 40px;
      text-align: center;
      font-size: 12px;
      color: var(--ink-dim);
      border-top: 1px solid var(--sep);
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      header, .hero, .features { padding-left: 24px; padding-right: 24px; }
      .features { flex-direction: column; gap: 0; }
      .feat + .feat { border-left: none; border-top: 1px solid var(--sep); }
      .feat { padding: 24px 0 0; }
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">一隅</span>
    <a href="./" class="open-link">打开应用 →</a>
  </header>

  <main class="hero">
    <div class="accent-dot"></div>
    <h1 class="hero-title">一隅</h1>
    <p class="hero-sub">每天一问，写下三行的自己</p>
    <a href="./" class="cta">
      开始记录
      <span class="cta-arrow">→</span>
    </a>
  </main>

  <div class="features">
    <div class="feat">
      <div class="feat-glyph">✦</div>
      <div class="feat-name">每天一问</div>
      <div class="feat-desc">每天一个不同的问题，全球同步轮转，从不重复</div>
    </div>
    <div class="feat">
      <div class="feat-glyph">◎</div>
      <div class="feat-name">三行就够</div>
      <div class="feat-desc">写下三行记录，少即是多，轻盈不费力</div>
    </div>
    <div class="feat">
      <div class="feat-glyph">○</div>
      <div class="feat-name">纯本地</div>
      <div class="feat-desc">所有文字只存在你自己的设备上，不上传</div>
    </div>
  </div>

  <footer>
    <a href="https://lysandrazyq.github.io/lumitrace/" target="_blank" rel="noopener">Lumitrace Studio</a>
  </footer>

</body>
</html>
